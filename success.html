<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán thành công</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            display: flex; justify-content: center; align-items: center; color: white; overflow: hidden;
        }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .bill-card {
            width: 450px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .icon-success { font-size: 60px; color: #4bb543; margin-bottom: 10px; }
        h2 { margin-bottom: 20px; color: #00c6ff; }
        .bill-details {
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            line-height: 2;
        }
        .line { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(255,255,255,0.2); }
        .btn-home {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg,#00c6ff,#0072ff);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-home:hover { box-shadow: 0 0 20px #00c6ff; transform: translateY(-2px); }
    </style>
</head>
<body>

<canvas id="rain"></canvas>

<div class="bill-card">
    <div class="icon-success">✔</div>
    <h2>Thanh toán thành công!</h2>
    
    <div class="bill-details" id="billContent">
        <!-- Thông tin bill sẽ hiển thị ở đây -->
    </div>

    <a href="home.html" class="btn-home">Quay về trang chủ</a>
</div>

<script>
    
        /* 1. LẤY DỮ LIỆU ĐƠN HÀNG & TÀI KHOẢN ĐANG ĐĂNG NHẬP */
    const order = JSON.parse(localStorage.getItem("currentOrder"));
    const currentUser = sessionStorage.getItem("currentUser") || "Khách vãng lai"; // Lấy email từ trang Login
    const billContent = document.getElementById("billContent");

    if(order) {
        // Hiển thị thông tin hóa đơn cho khách xem
        const orderTime = new Date().toLocaleString('vi-VN');
        
        billContent.innerHTML = `
            <div class="line"><span>Mã đơn hàng:</span> <b>#${order.id || '2026-X'}</b></div>
            <div class="line"><span>Tài khoản đặt:</span> <b style="color:#00c6ff">${currentUser}</b></div>
            <div class="line"><span>Người chuyển:</span> <b>${order.payerName}</b></div>
            <div class="line"><span>Số tiền:</span> <b style="color:#00c6ff">${(order.total || 0).toLocaleString()}đ</b></div>
            <div class="line"><span>Thời gian:</span> <b>${orderTime}</b></div>
            <div class="line"><span>Trạng thái:</span> <b style="color:#4bb543">Chờ Admin duyệt</b></div>
        `;

        // 2. GỬI DỮ LIỆU VỀ HỆ THỐNG ADMIN COMMANDER
        let allOrders = JSON.parse(localStorage.getItem("orders")) || [];
        
        // Kiểm tra tránh trùng lặp đơn hàng khi khách F5 trang
        const isExisted = allOrders.find(o => o.id === order.id);
        
        if(!isExisted) {
            const adminOrder = {
                id: order.id || Date.now(),
                product: order.productName || "Sản phẩm Tết 2026",
                client: order.payerName,
                userEmail: currentUser, // Gắn tài khoản người đặt vào đơn hàng
                total: order.total,
                status: "Chờ duyệt", // Mặc định là chờ duyệt để Admin chỉnh sửa
                date: orderTime
            };
            
            allOrders.push(adminOrder);
            localStorage.setItem("orders", JSON.stringify(allOrders));
            console.log("🚀 Đã gửi đơn hàng và thông tin tài khoản về Admin!");
        }
    } else {
        billContent.innerHTML = "<p style='color:#ff4b2b'>⚠️ Không tìm thấy dữ liệu hóa đơn mới nhất.</p>";
    }

    /* 3. HIỆU ỨNG MƯA (GIỮ NGUYÊN) */
    const canvas = document.getElementById("rain");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let drops = [];
    for(let i = 0; i < 200; i++) { 
        drops.push({x: Math.random() * canvas.width, y: Math.random() * canvas.height, l: 15, s: 5}); 
    }
    function rain() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(255,255,255,0.25)";
        drops.forEach(d => {
            ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x - 2, d.y + d.l); ctx.stroke();
            d.y += d.s; if(d.y > canvas.height) d.y = 0;
        });
        requestAnimationFrame(rain);
    }
    rain();

    
</script>
<script>

const product = JSON.parse(localStorage.getItem("currentProduct"));

if(product){

const bill = document.querySelector(".bill-details");

const div = document.createElement("div");
div.className = "line";

div.innerHTML = `
<span>Sản phẩm</span>
<span>${product.name}</span>
`;

bill.prepend(div);

let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.push({
name: product.name,
price: product.price,
date: new Date().toLocaleString()
});

localStorage.setItem("orders", JSON.stringify(orders));

}

</script>

</body>
</html>
