<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanh toán QR - TRAN BACH</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
width:500px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

h2{
text-align:center;
margin-bottom:15px;
}

.amount{
text-align:center;
font-size:22px;
font-weight:600;
margin:10px 0;
color:#00c6ff;
}

.note{
text-align:center;
font-size:14px;
margin-bottom:15px;
opacity:0.9;
}

.qr{
text-align:center;
margin:15px 0;
}

.qr img{
width:240px;
border-radius:15px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.15);
color:white;
outline:none;
}

input[type="file"]{
background:none;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-weight:600;
cursor:pointer;
transition: 0.3s;
}

button:hover{
box-shadow:0 0 20px #00c6ff;
transform: scale(1.02);
}
</style>
</head>
<body>

<canvas id="rain"></canvas>

<div class="container">

<h2>🌧 Thanh toán đơn hàng</h2>

<div class="amount" id="amount">Đang tải số tiền...</div>

<div class="note" id="note">Đang tải mã đơn...</div>

<div class="qr">
<!-- Thay đổi link ảnh QR của bạn ở đây -->
<img src="z7575484411348_8b3c79d9f038f6601e0b315624371c1c.jpg" alt="QR Thanh Toán">
</div>

<input type="text" id="payerName" placeholder="Tên người chuyển khoản (Vd: Nguyễn Văn A)">
<input type="text" id="bankName" placeholder="Ngân hàng chuyển (Vd: MB Bank, Vietcombank)">
<input type="file" id="proof">

<button onclick="confirmPayment()">Tôi đã thanh toán</button>

</div>

<script>
// Lấy thông tin đơn hàng từ LocalStorage
const order = JSON.parse(localStorage.getItem("currentOrder"));

if(order){
    document.getElementById("amount").innerText = 
    "Số tiền: " + order.total.toLocaleString() + "đ";

    document.getElementById("note").innerText =
    "Nội dung CK: " + order.id;
}else{
    document.getElementById("amount").innerText="Không tìm thấy đơn hàng";
}

// HÀM XỬ LÝ KHI BẤM NÚT (BƯỚC 1)
function confirmPayment(){
    const payer = document.getElementById("payerName").value.trim();
    const bank = document.getElementById("bankName").value.trim();

    // 1. Kiểm tra xem khách đã nhập đủ thông tin chưa
    if(!payer || !bank){
        alert("Vui lòng điền đầy đủ Tên và Ngân hàng để shop kiểm tra đơn nhé!");
        return;
    }

    // 2. Cập nhật dữ liệu đơn hàng mới vào biến order
    const updatedOrder = {
        ...order, // Giữ lại id và total cũ
        payerName: payer,
        bankName: bank,
        status: "Đã gửi thông báo thanh toán",
        paymentTime: new Date().toLocaleString()
    };

    // 3. Lưu lại vào localStorage để trang success.html có thể đọc được
    localStorage.setItem("currentOrder", JSON.stringify(updatedOrder));

    // 4. Thông báo và Chuyển hướng sang trang success.html
    alert("Thông tin đã được ghi nhận. Đang tạo hóa đơn...");
    window.location.href = "success.html"; 
}

/* Hiệu ứng Rain */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let drops=[];
for(let i=0;i<200;i++){
    drops.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,l:15,s:5});
}

function rain(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle="rgba(255,255,255,0.25)";
    drops.forEach(d=>{
        ctx.beginPath();
        ctx.moveTo(d.x,d.y);
        ctx.lineTo(d.x-2,d.y+d.l);
        ctx.stroke();
        d.y+=d.s;
        if(d.y>canvas.height)d.y=0;
    });
    requestAnimationFrame(rain);
}
rain();
</script>

</body>
</html>
